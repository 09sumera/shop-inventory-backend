<!DOCTYPE html>
<html>

<head>
    <title>Add Product</title>

    <!-- MOBILE RESPONSIVE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='images/favicon-32x32.png') }}">

    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

    <!-- 🔐 BLOCK PAGE IF NOT LOGGED IN -->
    <script>
        (async function () {
            const res = await fetch("/login-check", {
                credentials: "include"
            });

            if (res.status === 401) {
                window.location.href = "/";
            }
        })();
    </script>

    <!-- MOBILE TOPBAR -->
    <div class="mobile-topbar">
        <button onclick="toggleSidebar()" class="menu-btn">
            <i class="fa-solid fa-bars"></i>
        </button>

        <span class="mobile-title">Shop Inventory</span>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="brand">
            <i class="fa-solid fa-boxes-stacked"></i> Shop Inventory
        </div>

        <a href="/home">
            <i class="fa-solid fa-house"></i> Home
        </a>

        <a href="/products-page">
            <i class="fa-solid fa-list"></i> Products
        </a>

        <a href="/add-product-page" class="active">
            <i class="fa-solid fa-circle-plus"></i> Add Product
        </a>

        <a href="/sell-page">
            <i class="fa-solid fa-cart-shopping"></i> Sell
        </a>

        <a href="/restock-page">
            <i class="fa-solid fa-arrow-rotate-right"></i> Restock
        </a>

        <a href="/dashboard-page">
            <i class="fa-solid fa-chart-line"></i> Dashboard
        </a>

        <a href="#" onclick="toggleDarkMode()">
            <i class="fa-solid fa-moon"></i> Dark Mode
        </a>

        <a href="#" onclick="logout()">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
        </a>
    </div>

    <!-- MAIN CONTENT -->
    <div class="container">
        <h2>Add Product</h2>

        <input id="pid" placeholder="Product ID"><br><br>
        <input id="name" placeholder="Product Name"><br><br>
        <input id="price" placeholder="Price"><br><br>
        <input id="qty" placeholder="Quantity"><br><br>

        <button onclick="addProduct()">Add</button>

        <p id="msg"></p>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-left">
            © 2026 Shop Inventory System
        </div>

        <div class="footer-center">
            Built with Flask · MongoDB · Chart.js
        </div>

        <div class="footer-right">
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Support</a>
        </div>
    </footer>

    <!-- SCRIPTS -->
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>

    <script>
        function addProduct() {
            fetch("/add", {
                method: "POST",
                credentials: "include",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    id: Number(document.getElementById("pid").value),
                    name: document.getElementById("name").value,
                    price: Number(document.getElementById("price").value),
                    qty: Number(document.getElementById("qty").value)
                })
            })
                .then(res => res.json())
                .then(data => {
                    document.getElementById("msg").innerText =
                        data.message || data.error || "No response";
                })
                .catch(() => {
                    document.getElementById("msg").innerText = "Server error";
                });
        }

        function logout() {
            fetch("/logout", {
                method: "POST",
                credentials: "include"
            }).then(() => {
                window.location.href = "/";
            });
        }
    </script>

</body>

</html>
